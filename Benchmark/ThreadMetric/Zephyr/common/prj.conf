# =============================================================================
# Thread-Metric strict-parity Zephyr configuration.
#
# Apples-to-apples baseline against FreeRTOS / TaktOS / ThreadX:
#   - 1 kHz tick rate                 matches FreeRTOS configTICK_RATE_HZ=1000
#                                     and ThreadX TX_TIMER_TICKS_PER_SECOND=1000.
#   - Tickless OFF                    matches the others (tick interrupt every ms).
#   - Size-optimized                  matches -Os used everywhere else.
#   - Single-CPU                      all RTOSes run single-core.
#   - No timeslicing                  matches FreeRTOS configUSE_TIME_SLICING=0
#                                     and ThreadX TX_DISABLE_PREEMPTION_THRESHOLD.
#
# Memory protection  MPU OFF in this round:
#   FreeRTOS uses ARM_CM4F port (no MPU). TaktOS calls TaktOSInit with
#   HandlerBaseAddr=0u (MPU code path not bound). ThreadX uses cortex_m4/gnu
#   standard port (no MPU integration). All three  zero MPU overhead.
#   Zephyr matches with CONFIG_MPU=n / CONFIG_ARM_MPU=n. A separate MPU-ON
#   round will follow once the other three RTOSes' MPU paths are wired up.
#
# Software safety checks  ON in this round:
#   FreeRTOS pays for configCHECK_FOR_STACK_OVERFLOW=2 (canary on every
#   context switch) and configASSERT (null/handle validation).
#   TaktOS bakes in always-on null parameter check on every public API and
#   always-on stack-guard check on every tick (no opt-out, auto-defined for
#   ARMv6-M / ARMv7-M; ARMv8-M uses hardware PSPLIM).
#   ThreadX pays for TX_ENABLE_STACK_CHECKING (canary on every switch).
#   Zephyr matches with CONFIG_STACK_SENTINEL=y (canary) and
#   CONFIG_MEM_SLAB_POINTER_VALIDATE=y (handle validation).
#
# FPU  ON: matches FreeRTOS / TaktOS / ThreadX (-mfpu=fpv4-sp-d16 on M4,
#   fpv5-sp-d16 on M33; -mfloat-abi=hard everywhere).
#
# Upstream Zephyr's "thread_metric" benchmark also uses a 100 Hz tickless
# config to win raw-throughput benchmarks; we keep 1000 Hz tick-driven here:
#   CONFIG_TICKLESS_KERNEL=y          <-- removed: matches others (tick-driven)
#   CONFIG_SYS_CLOCK_TICKS_PER_SEC=100 <-- removed: matches others (1000 Hz)
# =============================================================================

# --- Tick rate and tickless ---
CONFIG_TICKLESS_KERNEL=n
CONFIG_SYS_CLOCK_TICKS_PER_SEC=1000

# --- Optimization (matches -Os elsewhere) ---
CONFIG_SIZE_OPTIMIZATIONS=y
CONFIG_SPEED_OPTIMIZATIONS=n

# --- Scheduler ---
CONFIG_TIMESLICING=n
CONFIG_MP_MAX_NUM_CPUS=1
CONFIG_THREAD_LOCAL_STORAGE=n

# --- MPU OFF this round (parity with FreeRTOS / TaktOS / ThreadX) ---
CONFIG_MPU=n
CONFIG_ARM_MPU=n
CONFIG_HW_STACK_PROTECTION=n

# --- Software safety checks ON (parity with the other three RTOSes) ---
# Stack canary: written at thread create, checked on every context switch.
# Equivalent to FreeRTOS configCHECK_FOR_STACK_OVERFLOW=2, ThreadX
# TX_ENABLE_STACK_CHECKING, and TaktOS's always-on guard-word check.
CONFIG_STACK_SENTINEL=y
CONFIG_THREAD_STACK_INFO=n
CONFIG_NULL_POINTER_EXCEPTION_DETECTION_DWT=n


# --- FPU on (matches Cortex-M4F / M33 with FPU) ---
CONFIG_FPU=y
CONFIG_FPU_SHARING=y

# --- Console (printk over UART) ---
CONFIG_SERIAL=y
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y
CONFIG_STDOUT_CONSOLE=n
CONFIG_PRINTK=y

# --- No logging overhead (matches other RTOSes  no debug prints) ---
CONFIG_LOG=n
CONFIG_USE_SEGGER_RTT=n
CONFIG_RTT_CONSOLE=n
CONFIG_LOG_BACKEND_RTT=n
CONFIG_BOOT_BANNER=n

# --- libc ---
CONFIG_PICOLIBC=y

# --- TM5 software interrupt support (only needed if InterruptProcessing tests
#     are run; harmless for the others, kept for symmetry) ---
CONFIG_IRQ_OFFLOAD=y

# --- Heap: zero. All Thread-Metric storage is static. ---
CONFIG_HEAP_MEM_POOL_SIZE=0

# --- Main thread stack: large enough for tm_main() to call test_init_fn() ---
CONFIG_MAIN_STACK_SIZE=2048
